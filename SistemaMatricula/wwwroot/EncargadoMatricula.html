<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* MANTENEMOS TU ESTILO ORIGINAL */
        * {
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
        }

        .header {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .card-stat {
            border-radius: 20px;
            padding: 25px;
            color: white;
            transition: 0.4s;
        }

            .card-stat:hover {
                transform: translateY(-10px) scale(1.02);
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            }

        .bg-blue {
            background: #0077b6;
        }

        .bg-green {
            background: #2a9d8f;
        }

        .bg-orange {
            background: #f4a261;
        }

        .tabla-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .tabla-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        thead {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            border-radius: 15px;
        }

            thead th {
                color: white;
                padding: 14px;
                font-size: 14px;
                text-align: left;
                letter-spacing: 0.5px;
            }

        tbody tr {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

            tbody tr:hover {
                transform: translateY(-5px) scale(1.02);
                background: linear-gradient(135deg, #dbeafe, #bfdbfe);
                box-shadow: 0 10px 25px rgba(37,99,235,0.5);
            }

        td {
            padding: 15px;
            color: #1e293b;
            font-weight: 500;
        }

        tbody tr td:first-child {
            border-radius: 20px 0 0 20px;
            font-weight: 600;
        }

        tbody tr td:last-child {
            border-radius: 0 20px 20px 0;
        }

        .estado {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .matriculado {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .no-matriculado {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
        }

        .actions button {
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            margin-right: 5px;
            transition: 0.2s;
            color: white;
        }

        .ver {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        .activar {
            background: linear-gradient(135deg, #22c55e, #15803d);
        }

        .desactivar {
            background: linear-gradient(135deg, #ef4444, #991b1b);
        }

        .actions button:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(59,130,246,0.7);
        }

        .search-box {
            border-radius: 30px;
            padding: 10px;
        }

        .btn-custom {
            border-radius: 30px;
        }
    </style>
</head>

<body>

    <div class="container mt-4">
        <div class="header shadow">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="bi bi-people"></i> Gestión de Aspirantes</h2>
                <span class="badge bg-light text-dark">Encargado de Matrícula</span>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card-stat bg-blue text-center">
                    <h5>Total Aspirantes</h5>
                    <h2 id="totalAspirantes">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat bg-green text-center">
                    <h5>Matriculados</h5>
                    <h2 id="totalMatriculados">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat bg-orange text-center">
                    <h5>No Matriculados</h5>
                    <h2 id="totalNoMatriculados">0</h2>
                </div>
            </div>
        </div>

        <div class="card shadow mb-4 p-3" style="border-radius: 20px;">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="busquedaEmail" class="form-control search-box" placeholder="Buscar por email...">
                </div>
                <div class="col-md-4">
                    <select id="filtroEstado" class="form-select search-box">
                        <option value="Todos">Todos</option>
                        <option value="Matriculados">Matriculados</option>
                        <option value="NoMatriculados">No Matriculados</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button onclick="cargarAspirantes()" class="btn btn-primary w-100 btn-custom">Buscar</button>
                </div>
            </div>
        </div>

        <div class="tabla-container">
            <div class="tabla-header">
                <h4>Lista de Aspirantes</h4>
                <span class="badge bg-primary" id="contadorLista">0</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Carrera</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaAspirantes"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalDetalleCita" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px; border: none;">
                <div class="modal-header bg-primary text-white" style="border-radius: 20px 20px 0 0;">
                    <h5 class="modal-title"><i class="bi bi-calendar-check"></i> Detalle de la Cita</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <p><strong>Aspirante:</strong> <span id="detNombre"></span></p>
                    <p><strong>Carrera:</strong> <span id="detCarrera"></span></p>
                    <hr>
                    <div class="row text-center">
                        <div class="col-6">
                            <small class="text-muted d-block">HORA INICIO</small>
                            <span class="badge bg-info text-dark" id="detInicio" style="font-size: 1.1em;"></span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block">HORA FIN</small>
                            <span class="badge bg-info text-dark" id="detFin" style="font-size: 1.1em;"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
