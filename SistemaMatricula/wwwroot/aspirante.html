<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aspirante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
        }

        .card-form {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .btn-custom {
            border-radius: 25px;
            font-weight: 600;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="header shadow text-center">
            <h2>Registro y Solicitud de Cita</h2>
        </div>

        <div class="card-form shadow">
            <h4 class="mb-4">Datos Personales</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input id="nombre" class="form-control" placeholder="Ej: Juan" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido</label>
                    <input id="apellido" class="form-control" placeholder="Ej: Pérez" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico</label>
                    <input id="email" type="email" class="form-control" placeholder="juan@correo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input id="telefono" class="form-control" placeholder="8888-8888">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Carrera de Interés</label>
                    <select id="carrera" class="form-select" required>
                        <option value="">Cargando carreras...</option>
                    </select>
                </div>
            </div>

            <hr class="my-4">
            <h4 class="mb-3">Horario de la Cita</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Fecha</label>
                    <input id="fecha" type="date" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Hora Inicio</label>
                    <input id="horaInicio" type="time" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Hora Fin</label>
                    <input id="horaFin" type="time" class="form-control" required>
                </div>
            </div>

            <div class="mt-4">
                <button onclick="crearAspirante()" class="btn btn-primary w-100 btn-custom">
                    Registrar y Solicitar Cita
                </button>
            </div>
            <div id="mensaje" class="mt-3"></div>
        </div>
    </div>

    <script>
        // Cargar carreras dinámicamente desde el controlador Aspirantes
        async function cargarCarreras() {
            try {
                const response = await fetch('/api/Aspirantes/carreras');
                if (!response.ok) throw new Error();
                const data = await response.json();
                const select = document.getElementById("carrera");
                select.innerHTML = '<option value="">Seleccione una carrera</option>';

                data.forEach(c => {
                    const nombre = c.nombre || c.Nombre || c; // Maneja objetos o strings
                    select.innerHTML += `<option value="${nombre}">${nombre}</option>`;
                });
            } catch (error) {
                mostrarMensaje("Error al conectar con el servidor de carreras.", "danger");
            }
        }

        async function crearAspirante() {
            const aspiranteData = {
                Nombre: document.getElementById("nombre").value.trim(),
                Apellido: document.getElementById("apellido").value.trim(),
                Email: document.getElementById("email").value.trim(),
                Telefono: document.getElementById("telefono").value.trim(),
                CarreraInteres: document.getElementById("carrera").value,
                // IMPORTANTE: Los nombres deben ser idénticos al DTO
                FechaCita: document.getElementById("fecha").value, // "16/04/2026"
                HoraInicio: document.getElementById("horaInicio").value, // "06:58"
                HoraFin: document.getElementById("horaFin").value,     // "07:59"
                EstaMatriculado: false // Agregamos este para completar el DTO
            };

            console.log("Enviando:", aspiranteData);

            const response = await fetch("/api/Aspirantes", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(aspiranteData)
            });

            if (response.ok) {
                alert("¡Éxito!");
            } else {
                const errorMsg = await response.text();
                console.error("Error del servidor:", errorMsg);
                alert("Error: " + errorMsg);
            }
        }
        function mostrarMensaje(texto, tipo) {
            const msjDiv = document.getElementById("mensaje");
            msjDiv.innerHTML = `<div class="alert alert-${tipo} shadow-sm">${texto}</div>`;
            setTimeout(() => { msjDiv.innerHTML = ""; }, 6000);
        }

        function limpiarFormulario() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById("carrera").value = "";
        }

        window.onload = cargarCarreras;
    </script>
</body>
</html>
