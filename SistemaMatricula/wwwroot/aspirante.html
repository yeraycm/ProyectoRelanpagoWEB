<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aspirante</title>

    <!-- Bootstrap + Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
        }

        .card-form {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .btn-custom {
            border-radius: 25px;
        }

        .header {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <!-- HEADER -->
        <div class="header shadow">
            <h2>Registro y Solicitud de Cita</h2>
        </div>

        <!-- FORM -->
        <div class="card-form">

            <h4 class="mb-4">Datos del Aspirante</h4>

            <div class="row g-3">

                <div class="col-md-6">
                    <input id="nombre" class="form-control" placeholder="Nombre" required>
                </div>

                <div class="col-md-6">
                    <input id="apellido" class="form-control" placeholder="Apellido" required>
                </div>

                <div class="col-md-6">
                    <input id="email" type="email" class="form-control" placeholder="Correo" required>
                </div>

                <div class="col-md-6">
                    <input id="telefono" class="form-control" placeholder="Teléfono">
                </div>

                <!-- Carreras dinámicas -->
                <div class="col-md-12">
                    <select id="carrera" class="form-select" required>
                        <option value="">Seleccione una carrera</option>
                    </select>
                </div>

            </div>

            <hr class="my-4">

            <h4 class="mb-3">Solicitar Cita</h4>

            <div class="row g-3">

                <div class="col-md-6">
                    <input id="fecha" type="date" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <input id="horaInicio" type="time" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <input id="horaFin" type="time" class="form-control" required>
                </div>

            </div>

            <div class="mt-4">
                <button onclick="crearAspirante()" class="btn btn-primary w-100 btn-custom">
                    Registrar y Solicitar Cita
                </button>
            </div>

            <div id="mensaje" class="mt-3"></div>

        </div>

    </div>

    <script>

        async function cargarCarreras() {
            try {
                const response = await fetch('/api/Aspirantes/carreras');
                const data = await response.json();

                const select = document.getElementById("carrera");

                data.forEach(c => {
                    select.innerHTML += `<option value="${c}">${c}</option>`;
                });

            } catch {
                mostrarMensaje("Error cargando carreras", "danger");
            }
        }

        async function crearAspirante() {

            const nombre = document.getElementById("nombre").value.trim();
            const apellido = document.getElementById("apellido").value.trim();
            const email = document.getElementById("email").value.trim();
            const telefono = document.getElementById("telefono").value.trim();
            const carrera = document.getElementById("carrera").value;

            const fecha = document.getElementById("fecha").value;
            const horaInicio = document.getElementById("horaInicio").value;
            const horaFin = document.getElementById("horaFin").value;

            // VALIDACIONES 🔥
            if (!nombre || !apellido || !email || !carrera || !fecha || !horaInicio || !horaFin) {
                mostrarMensaje("Complete todos los campos obligatorios", "danger");
                return;
            }

            try {
                const response = await fetch("/api/Aspirantes", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nombre: nombre,
                        apellido: apellido,
                        email: email,
                        telefono: telefono,
                        carreraInteres: carrera,
                        fecha: fecha,
                        horaInicio: horaInicio,
                        horaFin: horaFin
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    mostrarMensaje("Registro y cita guardados correctamente", "success");
                    limpiarFormulario();
                } else {
                    mostrarMensaje(data.error || "Error al registrar", "danger");
                }

            } catch {
                mostrarMensaje("Error de conexión", "danger");
            }
        }

        function mostrarMensaje(texto, tipo) {
            document.getElementById("mensaje").innerHTML =
                `<div class="alert alert-${tipo}">${texto}</div>`;
        }

        function limpiarFormulario() {
            document.getElementById("nombre").value = "";
            document.getElementById("apellido").value = "";
            document.getElementById("email").value = "";
            document.getElementById("telefono").value = "";
            document.getElementById("carrera").value = "";
            document.getElementById("fecha").value = "";
            document.getElementById("horaInicio").value = "";
            document.getElementById("horaFin").value = "";
        }

        window.onload = cargarCarreras;

    </script>

</body>
</html>
