<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aspirante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
            min-height: 100vh;
            /* Agregamos un padding top para que el contenido no quede debajo del botón del menú */
            padding-top: 20px;
        }

        .card-form {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .header {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .btn-custom {
            border-radius: 25px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s ease;
        }

            .btn-custom:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,119,182,0.3);
            }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div id="menu-container"></div>

        <div class="header shadow text-center">
            <h2><i class="bi bi-person-plus-fill me-2"></i>Registro y Solicitud de Cita</h2>
        </div>

        <div class="card-form shadow">
            <h4 class="mb-4 text-primary border-bottom pb-2">Datos Personales</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre</label>
                    <input id="nombre" class="form-control" placeholder="Ej: Juan" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Apellido</label>
                    <input id="apellido" class="form-control" placeholder="Ej: Pérez" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input id="email" type="email" class="form-control" placeholder="juan@correo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Teléfono (Solo números)</label>
                    <input id="telefono" class="form-control" placeholder="88888888">
                </div>
                <div class="col-md-12">
                    <label class="form-label fw-bold">Carrera de Interés</label>
                    <select id="carrera" class="form-select" required>
                        <option value="">Cargando carreras...</option>
                    </select>
                </div>
            </div>

            <hr class="my-4">
            <h4 class="mb-3 text-primary border-bottom pb-2">Horario de la Cita</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Fecha</label>
                    <input id="fecha" type="date" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Hora Inicio</label>
                    <input id="horaInicio" type="time" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Hora Fin</label>
                    <input id="horaFin" type="time" class="form-control" required>
                </div>
            </div>

            <div class="mt-4">
                <button onclick="crearAspirante()" class="btn btn-primary w-100 btn-custom">
                    <i class="bi bi-send-check me-2"></i>Registrar y Solicitar Cita
                </button>
            </div>

            <div id="mensaje" class="mt-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ---------------------------------------------------------
        // 1. LÓGICA DEL MENÚ LATERAL
        // ---------------------------------------------------------

        // Cargar el HTML del menú
        fetch('Menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('menu-container').innerHTML = data;
            });

        // Definimos la función de abrir/cerrar aquí para que el botón la encuentre
        window.toggleMenu = function () {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) {
                sidebar.classList.toggle('active');
            }
        };

        // ---------------------------------------------------------
        // 2. LÓGICA DE REGISTRO DE ASPIRANTE
        // ---------------------------------------------------------

        async function cargarCarreras() {
            try {
                const response = await fetch('/api/Aspirantes/carreras');
                if (!response.ok) throw new Error();
                const data = await response.json();
                const select = document.getElementById("carrera");
                select.innerHTML = '<option value="">Seleccione una carrera</option>';

                data.forEach(c => {
                    const nombre = c.nombre || c.Nombre || c;
                    select.innerHTML += `<option value="${nombre}">${nombre}</option>`;
                });
            } catch (error) {
                mostrarMensaje("Error al conectar con el servidor de carreras.", "danger");
            }
        }

        async function crearAspirante() {
            const nombre = document.getElementById("nombre").value.trim();
            const apellido = document.getElementById("apellido").value.trim();
            const email = document.getElementById("email").value.trim();
            const telefono = document.getElementById("telefono").value.trim();
            const carrera = document.getElementById("carrera").value;
            const fecha = document.getElementById("fecha").value;
            const horaInicio = document.getElementById("horaInicio").value;
            const horaFin = document.getElementById("horaFin").value;

            if (!nombre || !apellido || !email || !carrera || !fecha || !horaInicio || !horaFin) {
                mostrarMensaje("Todos los campos marcados son obligatorios y no pueden estar vacíos.", "warning");
                return;
            }

            if (telefono && isNaN(telefono)) {
                mostrarMensaje("El teléfono debe contener únicamente números.", "warning");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                mostrarMensaje("Por favor, ingrese un formato de correo electrónico válido.", "warning");
                return;
            }

            const aspiranteData = {
                Nombre: nombre,
                Apellido: apellido,
                Email: email,
                Telefono: telefono,
                CarreraInteres: carrera,
                FechaCita: fecha,
                HoraInicio: horaInicio,
                HoraFin: horaFin,
                EstaMatriculado: false
            };

            try {
                const response = await fetch("/api/Aspirantes", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(aspiranteData)
                });

                const resultado = await response.json();

                if (!response.ok) {
                    mostrarMensaje(resultado.mensaje || "Error al procesar el registro.", "danger");
                    return;
                }

                mostrarMensaje("¡Aspirante registrado y cita asignada con éxito!", "success");
                limpiarFormulario();

            } catch (error) {
                console.error("Error de conexión:", error);
                mostrarMensaje("No se pudo establecer conexión con el servidor.", "danger");
            }
        }

        function mostrarMensaje(texto, tipo) {
            const msjDiv = document.getElementById("mensaje");
            msjDiv.innerHTML = `
                        <div class="alert alert-${tipo} alert-dismissible fade show shadow-sm">
                            <i class="bi bi-info-circle-fill me-2"></i> ${texto}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>`;

            setTimeout(() => {
                const alertElement = document.querySelector('.alert');
                if (alertElement) {
                    const bsAlert = new bootstrap.Alert(alertElement);
                    bsAlert.close();
                }
            }, 6000);
        }

        function limpiarFormulario() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById("carrera").value = "";
        }

        // Ejecutar al cargar la página
        window.onload = cargarCarreras;
    </script>
</body>
</html>
